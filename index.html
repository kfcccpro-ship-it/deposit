<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3182F6">
<title>수신업무방법서 | 새마을금고</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako_inflate.min.js"></script>
<style>
:root{
  --bg-white:#FFFFFF;--bg-gray-50:#F9FAFB;--bg-gray-100:#F2F4F6;
  --text-primary:#191F28;--text-secondary:#4E5968;--text-tertiary:#8B95A1;
  --border-default:#E5E8EB;
  --blue-primary:#3182F6;--blue-dark:#1B64DA;--blue-bg:#EBF4FF;
  --radius-md:12px;--radius-lg:16px;
  --shadow-card:0 1px 4px rgba(0,0,0,0.07);
  --nav-h:56px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-gray-50);color:var(--text-primary);-webkit-font-smoothing:antialiased;}
/* Header */
.hdr{background:var(--bg-white);border-bottom:1px solid var(--border-default);position:sticky;top:0;z-index:50;}
.hdr-in{max-width:640px;margin:0 auto;display:flex;align-items:center;height:50px;padding:0 16px;}
.logo{font-size:15px;font-weight:700;}.logo em{color:var(--blue-primary);font-style:normal;}
/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:14px;color:var(--text-tertiary);}
.spin{width:30px;height:30px;border:3px solid var(--border-default);border-top-color:var(--blue-primary);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
/* App */
.app{max-width:640px;margin:0 auto;padding:12px 14px;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px);}
/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--bg-white);border-top:1px solid var(--border-default);display:flex;padding-bottom:var(--safe-b);}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:var(--nav-h);border:none;background:none;font-family:inherit;cursor:pointer;color:var(--text-tertiary);font-size:10px;font-weight:600;transition:color .12s;}
.nbtn.active{color:var(--blue-primary);}
.nico{font-size:19px;line-height:1;}
/* Search */
.swrap{position:relative;margin-bottom:10px;}
.sinput{width:100%;padding:13px 42px;background:var(--bg-white);border:1.5px solid var(--border-default);border-radius:var(--radius-md);font-size:16px;font-family:inherit;color:var(--text-primary);outline:none;-webkit-appearance:none;transition:border .15s;}
.sinput:focus{border-color:var(--blue-primary);}
.sinput::placeholder{color:var(--text-tertiary);}
.sico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;color:var(--text-tertiary);}
.sclr{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--bg-gray-100);border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center;color:var(--text-secondary);}
.sclr.on{display:flex;}
/* Recent */
.rlbl{font-size:12px;font-weight:600;color:var(--text-tertiary);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.rdel{background:none;border:none;font-size:12px;color:var(--text-tertiary);cursor:pointer;font-family:inherit;padding:4px 0;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{display:inline-flex;align-items:center;gap:3px;padding:7px 11px;background:var(--bg-white);border:1px solid var(--border-default);border-radius:20px;font-size:13px;color:var(--text-secondary);cursor:pointer;-webkit-user-select:none;user-select:none;}
.chip:active{background:var(--blue-bg);border-color:var(--blue-primary);color:var(--blue-primary);}
.chip-x{font-size:10px;color:var(--text-tertiary);padding:2px 0 2px 3px;}
/* Result info */
.rinfo{font-size:12px;color:var(--text-tertiary);margin-bottom:10px;}
.rinfo b{color:var(--blue-primary);}
/* Card */
.card{background:var(--bg-white);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);margin-bottom:8px;overflow:hidden;}
.chead{padding:13px 13px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:6px;cursor:pointer;}
.cmeta{flex:1;min-width:0;}
.bdgs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px;}
.bp{padding:2px 7px;background:var(--blue-bg);color:var(--blue-primary);border-radius:4px;font-size:10px;font-weight:600;}
.bc{padding:2px 7px;background:var(--bg-gray-100);color:var(--text-secondary);border-radius:4px;font-size:10px;}
.ctit{font-size:14px;font-weight:700;line-height:1.4;word-break:keep-all;}
.ctit mark,.cprev mark{background:#FFF3CD;color:#92400E;border-radius:2px;padding:0 1px;}
.bmbtn{background:none;border:none;font-size:21px;cursor:pointer;flex-shrink:0;padding:2px 0 2px 6px;line-height:1;min-width:34px;text-align:right;}
.cdiv{height:1px;background:var(--border-default);margin:0 13px;}
.cprev{padding:9px 13px 12px;font-size:12px;color:var(--text-secondary);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
/* TOC */
.tpart{background:var(--bg-white);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);margin-bottom:8px;overflow:hidden;}
.thd{padding:14px 13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;-webkit-user-select:none;user-select:none;}
.tname{font-size:14px;font-weight:700;word-break:keep-all;margin-right:8px;}
.tright{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.tcnt{font-size:11px;color:var(--text-tertiary);}
.tarr{font-size:11px;color:var(--text-tertiary);transition:transform .2s;display:inline-block;}
.tarr.open{transform:rotate(90deg);}
.tchs{display:none;border-top:1px solid var(--border-default);}
.tchs.open{display:block;}
.tch{padding:12px 13px 12px 21px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-bottom:1px solid var(--border-default);-webkit-user-select:none;user-select:none;}
.tch:last-child{border-bottom:none;}
.tch:active{background:var(--bg-gray-50);}
.chname{font-size:13px;color:var(--text-secondary);word-break:keep-all;margin-right:8px;}
.chcnt{font-size:11px;color:var(--text-tertiary);flex-shrink:0;}
/* Empty */
.empty{padding:44px 16px;text-align:center;color:var(--text-tertiary);}
.eico{font-size:38px;margin-bottom:12px;}
.etxt{font-size:14px;line-height:1.8;}
.nores{padding:36px 16px;text-align:center;color:var(--text-tertiary);font-size:14px;}
/* Modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.mbg.open{display:flex;}
.modal{background:var(--bg-white);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column;padding-bottom:var(--safe-b);}
.mhdl{width:36px;height:4px;background:var(--border-default);border-radius:2px;margin:10px auto 0;}
.mhd{padding:14px 14px 12px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border-default);flex-shrink:0;}
.mtw{flex:1;margin-right:8px;}
.mbdgs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.mtit{font-size:15px;font-weight:700;line-height:1.4;word-break:keep-all;}
.mclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-tertiary);padding:0;min-width:32px;text-align:right;}
.mbody{padding:14px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.mctnt{font-size:13px;color:var(--text-secondary);line-height:1.9;white-space:pre-wrap;word-break:break-word;}
.mctnt mark{background:#FFF3CD;color:#92400E;border-radius:2px;padding:0 1px;}
.mft{padding:12px 14px;border-top:1px solid var(--border-default);flex-shrink:0;}
.mbm{width:100%;padding:14px;border:none;border-radius:var(--radius-md);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--bg-gray-100);color:var(--text-primary);transition:all .15s;}
.mbm.on{background:var(--blue-bg);color:var(--blue-primary);}
/* ═══════════════════════════════════════════════════════
   2배 글자 크기 모드 — 모바일 최적화
   대상: 삼성인터넷 / 크롬 / 카카오톡 웹뷰 (Android)
   기준 화면폭: 360px(보급형) ~ 430px(플래그십)
   ═══════════════════════════════════════════════════════ */

/* ── CSS 변수 재정의 ── */
body.fs2{
  --nav-h:88px;    /* 아이콘+텍스트 2배 → 네비 높이 확장 */
}

/* ── 앱 컨테이너: 네비 높이 반영 ── */
body.fs2 .app{
  padding-bottom:calc(88px + var(--safe-b) + 12px)!important;
}

/* ── 헤더 ── */
body.fs2 .hdr-in{height:64px!important;}
body.fs2 .logo{font-size:20px!important;}
body.fs2 .gear-btn{font-size:26px!important;padding:6px!important;}

/* ── 하단 네비게이션 ── */
body.fs2 .nbtn{
  font-size:16px!important;
  height:88px!important;
  gap:5px!important;
  padding:10px 0!important;
}
body.fs2 .nico{font-size:32px!important;}

/* ── 검색창 ── */
body.fs2 .sinput{
  font-size:22px!important;
  padding:18px 56px 18px 56px!important;
  border-radius:14px!important;
}
body.fs2 .sinput::placeholder{font-size:20px!important;}
body.fs2 .sico{
  font-size:22px!important;
  left:16px!important;
}
body.fs2 .sclr{
  width:34px!important;height:34px!important;
  font-size:16px!important;
  right:12px!important;
}

/* ── 최근 검색어 ── */
body.fs2 .rlbl{
  font-size:18px!important;
  margin-bottom:12px!important;
  flex-direction:column!important;
  align-items:flex-start!important;
  gap:6px!important;
}
body.fs2 .rdel{
  font-size:17px!important;
  padding:6px 10px!important;
  background:var(--bg-gray-100)!important;
  border-radius:8px!important;
}
body.fs2 .chips{gap:8px!important;margin-bottom:16px!important;}
body.fs2 .chip{
  font-size:18px!important;
  padding:10px 16px!important;
  border-radius:24px!important;
}

/* ── 검색 결과 정보 ── */
body.fs2 .rinfo{font-size:17px!important;margin-bottom:12px!important;}

/* ── 카드 ── */
body.fs2 .card{
  border-radius:18px!important;
  margin-bottom:12px!important;
}
body.fs2 .chead{
  padding:18px 16px 14px!important;
  gap:10px!important;
  align-items:flex-start!important;
}

/* ── 배지: 작은 화면에서 세로 배치 ── */
body.fs2 .bdgs{
  flex-direction:column!important;
  gap:5px!important;
  margin-bottom:8px!important;
}
body.fs2 .bp{
  font-size:16px!important;
  padding:4px 10px!important;
  border-radius:6px!important;
  display:inline-block!important;
  width:fit-content!important;
}
body.fs2 .bc{
  font-size:16px!important;
  padding:4px 10px!important;
  border-radius:6px!important;
  display:inline-block!important;
  width:fit-content!important;
}

/* ── 카드 제목 ── */
body.fs2 .ctit{
  font-size:22px!important;
  line-height:1.5!important;
  word-break:keep-all!important;
}

/* ── 북마크 버튼 ── */
body.fs2 .bmbtn{
  font-size:30px!important;
  min-width:44px!important;
  padding:4px 0 4px 8px!important;
}

/* ── 카드 미리보기 ── */
body.fs2 .cprev{
  font-size:19px!important;
  line-height:1.85!important;
  padding:12px 16px 16px!important;
}
body.fs2 .ctit mark,
body.fs2 .cprev mark{
  padding:0 2px!important;
  border-radius:3px!important;
}

/* ── 목차(TOC) ── */
body.fs2 .tpart{
  border-radius:18px!important;
  margin-bottom:10px!important;
}
body.fs2 .thd{padding:18px 16px!important;}
body.fs2 .tname{
  font-size:20px!important;
  line-height:1.4!important;
  word-break:keep-all!important;
}
body.fs2 .tright{gap:10px!important;}
body.fs2 .tcnt{font-size:17px!important;}
body.fs2 .tarr{font-size:16px!important;}
body.fs2 .tch{
  padding:16px 16px 16px 28px!important;
}
body.fs2 .chname{
  font-size:19px!important;
  line-height:1.4!important;
  word-break:keep-all!important;
}
body.fs2 .chcnt{font-size:17px!important;}

/* ── 모달 ── */
body.fs2 .modal{max-height:92vh!important;}
body.fs2 .mhdl{
  width:48px!important;height:5px!important;
  margin:14px auto 0!important;
}
body.fs2 .mhd{padding:18px 16px 16px!important;}
body.fs2 .mbdgs{
  flex-direction:column!important;
  gap:5px!important;
  margin-bottom:10px!important;
}
body.fs2 .mtit{
  font-size:22px!important;
  line-height:1.5!important;
}
body.fs2 .mclose{
  font-size:28px!important;
  min-width:44px!important;
  min-height:44px!important;
  display:flex!important;
  align-items:center!important;
  justify-content:flex-end!important;
}
body.fs2 .mbody{padding:18px 16px!important;}
body.fs2 .mctnt{
  font-size:20px!important;
  line-height:2.0!important;
}
body.fs2 .mctnt mark{padding:0 2px!important;}
body.fs2 .mft{padding:14px 16px!important;}
body.fs2 .mbm{
  font-size:20px!important;
  padding:18px!important;
  border-radius:14px!important;
}

/* ── 빈 상태 / 검색 없음 ── */
body.fs2 .eico{font-size:52px!important;}
body.fs2 .etxt{font-size:20px!important;line-height:2.0!important;}
body.fs2 .nores{font-size:20px!important;}

/* ── 설정 화면(fs2 선택 미리보기) ── */
body.fs2 .ss-title{font-size:26px!important;}
body.fs2 .ss-sub{font-size:18px!important;}


/* ── Settings Screen ── */
.settings-screen{position:fixed;inset:0;background:var(--bg-white);z-index:300;display:flex;flex-direction:column;}
.ss-hd{padding:20px 20px 0;border-bottom:1px solid var(--border-default);padding-bottom:16px;}
.ss-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.ss-sub{font-size:13px;color:var(--text-tertiary);}
.ss-body{flex:1;overflow-y:auto;padding:24px 20px;}
.ss-section{margin-bottom:28px;}
.ss-section-title{font-size:12px;font-weight:600;color:var(--text-tertiary);margin-bottom:10px;letter-spacing:0.5px;}
.fs-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fs-btn{padding:18px 12px;border:2px solid var(--border-default);border-radius:var(--radius-lg);background:var(--bg-white);cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;}
.fs-btn.active{border-color:var(--blue-primary);background:var(--blue-bg);}
.fs-btn-label{font-weight:700;color:var(--text-primary);margin-bottom:4px;}
.fs-btn.active .fs-btn-label{color:var(--blue-primary);}
.fs-btn-desc{font-size:11px;color:var(--text-tertiary);}
.fs-preview{margin-top:14px;background:var(--bg-gray-50);border-radius:var(--radius-md);padding:14px;}
.fs-preview-title{font-size:11px;color:var(--text-tertiary);margin-bottom:8px;font-weight:600;}
.fs-preview-card{background:var(--bg-white);border-radius:10px;padding:12px;border:1px solid var(--border-default);}
.ss-confirm-btn{width:100%;padding:16px;background:var(--blue-primary);color:#fff;border:none;border-radius:var(--radius-md);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;}
.ss-footer{padding:16px 20px;padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--border-default);}
/* Settings gear btn in header */
.gear-btn{margin-left:auto;background:none;border:none;font-size:20px;cursor:pointer;padding:4px;color:var(--text-tertiary);}
</style>
</head>
<body>
<!-- Settings Screen -->
<div class="settings-screen" id="SS">
  <div class="ss-hd">
    <div class="ss-title">⚙️ 화면 설정</div>
    <div class="ss-sub">글자 크기를 선택하세요</div>
  </div>
  <div class="ss-body">
    <div class="ss-section">
      <div class="ss-section-title">글자 크기</div>
      <div class="fs-options">
        <button class="fs-btn active" id="fsBtn1" onclick="selectFS(1)">
          <div class="fs-btn-label" style="font-size:16px">가나다</div>
          <div class="fs-btn-desc">기본 크기</div>
        </button>
        <button class="fs-btn" id="fsBtn2" onclick="selectFS(2)">
          <div class="fs-btn-label" style="font-size:24px">가나다</div>
          <div class="fs-btn-desc">2배 크게</div>
        </button>
      </div>
      <div class="fs-preview">
        <div class="fs-preview-title">미리보기</div>
        <div class="fs-preview-card">
          <div id="fsPrevTitle" style="font-weight:700;margin-bottom:4px;transition:font-size .2s">제15조(여신기간)</div>
          <div id="fsPrevBody" style="color:var(--text-secondary);line-height:1.7;transition:font-size .2s">여신기간은 채무자의 상환능력과 자금의 회전기간 등을 고려하여 정한다.</div>
        </div>
      </div>
    </div>
  </div>
  <div class="ss-footer">
    <button class="ss-confirm-btn" onclick="confirmSettings()">적용하고 시작하기</button>
  </div>
</div>
<div class="hdr"><div class="hdr-in"><div class="logo">새마을금고 <em>수신업무방법서</em></div><button class="gear-btn" onclick="openSettings()" title="설정">&#x2699;&#xFE0F;</button></div></div>
<div id="LD" class="loading"><div class="spin"></div><div>데이터 로딩 중...</div></div>
<div class="app" id="APP" style="display:none">
  <div id="pane-search">
    <div class="swrap">
      <span class="sico">&#x1F50D;</span>
      <input type="search" class="sinput" id="SI" placeholder="조문 내용, 제목, 키워드 검색"
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
        enterkeyhint="search">
      <button class="sclr" id="SC" onclick="CS()">&#x2715;</button>
    </div>
    <div id="RS"></div>
    <div id="RI" class="rinfo" style="display:none"></div>
    <div id="SR"></div>
  </div>
  <div id="pane-toc" style="display:none"><div id="TC"></div></div>
  <div id="pane-bookmark" style="display:none"><div id="BC"></div></div>
</div>
<nav class="bnav">
  <button class="nbtn active" id="nav-search" onclick="SW('search')"><span class="nico">&#x1F50D;</span>검색</button>
  <button class="nbtn" id="nav-toc" onclick="SW('toc')"><span class="nico">&#x1F4CB;</span>목차</button>
  <button class="nbtn" id="nav-bookmark" onclick="SW('bookmark')"><span class="nico">&#x2B50;</span>즐겨찾기</button>
</nav>
<div class="mbg" id="MB">
  <div class="modal">
    <div class="mhdl"></div>
    <div class="mhd">
      <div class="mtw"><div class="mbdgs" id="MBG"></div><div class="mtit" id="MTL"></div></div>
      <button class="mclose" onclick="CM()">&#x2715;</button>
    </div>
    <div class="mbody"><div class="mctnt" id="MCT"></div></div>
    <div class="mft"><button class="mbm" id="MBM" onclick="TBM()">&#x2606; 즐겨찾기 추가</button></div>
  </div>
</div>
<script>
(function(){
var ARTICLES=[],CQ='',CMID=null,ST=null;
var PARTS=["제1편 총칙", "제2편 수신업무"];
var CHAPTERS=["제1장 총론", "제2장 수신지원업무", "제3장 조세특례저축", "제4장 입출금이 자유로운 예금", "제5장 거치식예금", "제6장 적립식예금", "제7장 특별한시판매", "제8장 통장식상품", "제9장 인터넷뱅킹 연결계좌 관리", "제11장 비대면 실명확인 이용업무"];
function GB(){try{return JSON.parse(localStorage.getItem('mg_bm')||'[]');}catch(e){return[];}}
function SB(b){localStorage.setItem('mg_bm',JSON.stringify(b));}
function GR(){try{return JSON.parse(localStorage.getItem('mg_recent')||'[]');}catch(e){return[];}}
function SR2(r){localStorage.setItem('mg_recent',JSON.stringify(r));}
function IBM(id){return GB().indexOf(id)!==-1;}
function addR(q){if(!q.trim())return;var r=GR().filter(function(x){return x!==q;});r.unshift(q);if(r.length>10)r=r.slice(0,10);SR2(r);}
window.SW=function(t){
  ['search','toc','bookmark'].forEach(function(n){
    document.getElementById('pane-'+n).style.display=(n===t)?'block':'none';
    document.getElementById('nav-'+n).classList.toggle('active',n===t);
  });
  if(t==='toc')rTOC();if(t==='bookmark')rBM();
  window.scrollTo(0,0);
};
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hl(text,kws){
  var r=esc(text);if(!kws||!kws.length)return r;
  kws.forEach(function(k){if(!k)return;
    var re=new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
    r=r.replace(re,function(m){return'<mark>'+m+'</mark>';});
  });return r;
}
function getArt(id){for(var i=0;i<ARTICLES.length;i++){if(ARTICLES[i].id===id)return ARTICLES[i];}return null;}
document.getElementById('SI').addEventListener('input',function(){
  var q=this.value;document.getElementById('SC').classList.toggle('on',q.length>0);
  clearTimeout(ST);var qq=q;ST=setTimeout(function(){DS(qq);},300);
});
document.getElementById('SI').addEventListener('keydown',function(e){
  if(e.key==='Enter'){var q=this.value.trim();if(q){addR(q);rRecent();this.blur();}}
});
window.CS=function(){document.getElementById('SI').value='';document.getElementById('SC').classList.remove('on');CQ='';document.getElementById('SR').innerHTML='';document.getElementById('RI').style.display='none';rRecent();};
window.SQ=function(q){document.getElementById('SI').value=q;document.getElementById('SC').classList.add('on');DS(q);addR(q);rRecent();};
function DS(q){
  CQ=q.trim();var sr=document.getElementById('SR');var ri=document.getElementById('RI');
  if(!CQ){sr.innerHTML='';ri.style.display='none';rRecent();return;}
  document.getElementById('RS').style.display='none';
  var kws=CQ.split(/\s+/).filter(function(x){return x;});
  var res=ARTICLES.filter(function(a){
    var txt=(a.title+' '+a.body+' '+PARTS[a.pi]+' '+CHAPTERS[a.ci]).toLowerCase();
    return kws.every(function(k){return txt.indexOf(k.toLowerCase())!==-1;});
  });
  var total=res.length;var show=res.slice(0,80);
  ri.style.display='block';
  ri.innerHTML=total>0?('<b>'+total+'건</b> 검색됨'+(total>80?' · 상위 80건':'')):'검색 결과가 없습니다';
  sr.innerHTML=total===0?'<div class="nores">&#x1F50D; 다른 키워드로 검색해보세요</div>':show.map(function(a){return cHTML(a,kws);}).join('');
}
function cHTML(a,kws){
  var bm=IBM(a.id);
  var previewLen=document.body.classList.contains('fs2')?80:160;
  var preview=(a.body||'').slice(0,previewLen)+((a.body&&a.body.length>previewLen)?'...':'');
  return '<div class="card" id="card-'+a.id+'">'+
    '<div class="chead" onclick="OM('+a.id+')">'+
      '<div class="cmeta">'+
        '<div class="bdgs"><span class="bp">'+esc(PARTS[a.pi])+'</span><span class="bc">'+esc(CHAPTERS[a.ci])+'</span></div>'+
        '<div class="ctit">'+hl(a.title,kws)+'</div>'+
      '</div>'+
      '<button class="bmbtn" onclick="event.stopPropagation();TB('+a.id+')">'+(bm?'&#x2B50;':'&#x2606;')+'</button>'+
    '</div>'+
    '<div class="cdiv"></div>'+
    '<div class="cprev">'+hl(preview,kws)+'</div>'+
  '</div>';
}
function rTOC(){
  var st={};
  ARTICLES.forEach(function(a){
    if(!st[a.pi])st[a.pi]={chs:{}};
    var ck=a.pi+'_'+a.ci;
    if(!st[a.pi].chs[ck])st[a.pi].chs[ck]={pi:a.pi,ci:a.ci,cnt:0};
    st[a.pi].chs[ck].cnt++;
  });
  var html='';
  Object.keys(st).sort(function(a,b){return Number(a)-Number(b);}).forEach(function(pk){
    var pt=st[pk];var total=Object.keys(pt.chs).reduce(function(s,k){return s+pt.chs[k].cnt;},0);
    var chHtml=Object.keys(pt.chs).map(function(ck){
      var ch=pt.chs[ck];
      return '<div class="tch" onclick="FC('+ch.pi+','+ch.ci+')"><span class="chname">'+esc(CHAPTERS[ch.ci])+'</span><span class="chcnt">'+ch.cnt+'조</span></div>';
    }).join('');
    html+='<div class="tpart"><div class="thd" onclick="TP(this)"><div class="tname">'+esc(PARTS[Number(pk)])+'</div><div class="tright"><span class="tcnt">'+total+'조</span><span class="tarr">&#x25B6;</span></div></div><div class="tchs">'+chHtml+'</div></div>';
  });
  document.getElementById('TC').innerHTML=html;
}
window.TP=function(hd){var chs=hd.nextElementSibling;var ar=hd.querySelector('.tarr');var open=chs.classList.toggle('open');ar.classList.toggle('open',open);};
window.FC=function(pi,ci){
  SW('search');var res=ARTICLES.filter(function(a){return a.pi===pi&&a.ci===ci;});CQ='';
  document.getElementById('RI').style.display='block';
  document.getElementById('RI').innerHTML='<b>'+esc(CHAPTERS[ci])+'</b> · 총 '+res.length+'개 조문';
  document.getElementById('SR').innerHTML=res.map(function(a){return cHTML(a,[]);}).join('');
  document.getElementById('RS').style.display='none';
  document.getElementById('SI').value='';document.getElementById('SC').classList.remove('on');
};
window.TB=function(id){
  var bm=GB();var idx=bm.indexOf(id);
  if(idx!==-1){bm.splice(idx,1);}else{bm.push(id);}SB(bm);
  var card=document.getElementById('card-'+id);
  if(card){var btn=card.querySelector('.bmbtn');if(btn)btn.innerHTML=IBM(id)?'&#x2B50;':'&#x2606;';}
  if(CMID===id)rMBM();
};
function rBM(){
  var bm=GB();var el=document.getElementById('BC');
  if(!bm.length){el.innerHTML='<div class="empty"><div class="eico">&#x2B50;</div><div class="etxt">즐겨찾기한 조문이 없습니다<br><span style="font-size:12px">검색 후 &#x2606; 버튼을 눌러 추가하세요</span></div></div>';return;}
  var arts=ARTICLES.filter(function(a){return bm.indexOf(a.id)!==-1;});
  el.innerHTML=arts.map(function(a){return cHTML(a,[]);}).join('');
}
function rRecent(){
  var r=GR();var sec=document.getElementById('RS');
  if(CQ){sec.style.display='none';return;}sec.style.display='';
  if(!r.length){sec.innerHTML='';return;}
  sec.innerHTML='<div class="rlbl"><span>최근 검색어</span><button class="rdel" onclick="CAR()">전체 삭제</button></div>'+
    '<div class="chips">'+r.map(function(q){
      return '<span class="chip" onclick="SQ('+JSON.stringify(q)+')">'+esc(q)+
        '<span class="chip-x" onclick="event.stopPropagation();DR('+JSON.stringify(q)+')">&#x2715;</span></span>';
    }).join('')+'</div>';
}
window.CAR=function(){SR2([]);rRecent();};
window.DR=function(q){SR2(GR().filter(function(x){return x!==q;}));rRecent();};
window.OM=function(id){
  var a=getArt(id);if(!a)return;CMID=id;
  var kws=CQ?CQ.split(/\s+/).filter(function(x){return x;}):[]; 
  document.getElementById('MBG').innerHTML='<span class="bp">'+esc(PARTS[a.pi])+'</span><span class="bc" style="margin-left:3px">'+esc(CHAPTERS[a.ci])+'</span>';
  document.getElementById('MTL').innerHTML=hl(a.title,kws);
  document.getElementById('MCT').innerHTML=hl(a.title+(a.body?' '+a.body:''),kws);
  rMBM();document.getElementById('MB').classList.add('open');document.body.style.overflow='hidden';
};
function rMBM(){var btn=document.getElementById('MBM');var on=IBM(CMID);btn.innerHTML=on?'&#x2B50; 즐겨찾기 해제':'&#x2606; 즐겨찾기 추가';btn.classList.toggle('on',on);}
window.TBM=function(){TB(CMID);};
window.CM=function(){document.getElementById('MB').classList.remove('open');document.body.style.overflow='';CMID=null;};
document.getElementById('MB').addEventListener('click',function(e){if(e.target===this)CM();});

/* ── Settings ── */
var curFS = 1;
window.selectFS = function(n){
  curFS = n;
  document.getElementById('fsBtn1').classList.toggle('active', n===1);
  document.getElementById('fsBtn2').classList.toggle('active', n===2);
  var sz1 = n===2 ? '24px' : '15px';
  var sz2 = n===2 ? '18px' : '13px';
  document.getElementById('fsPrevTitle').style.fontSize = sz1;
  document.getElementById('fsPrevBody').style.fontSize = sz2;
}
window.confirmSettings = function(){
  applyFS(curFS);
  localStorage.setItem('mg_fs', curFS);
  document.getElementById('SS').style.display = 'none';
}
window.applyFS = function(n){
  document.body.classList.toggle('fs2', n===2);
}
window.openSettings = function(){
  var saved = parseInt(localStorage.getItem('mg_fs')||'1');
  selectFS(saved);
  document.getElementById('SS').style.display = 'flex';
}
// Check saved setting on load
var _ss = document.getElementById('SS');
var _savedFS = parseInt(localStorage.getItem('mg_fs')||'0');
if(_ss && (_savedFS === 1 || _savedFS === 2)){
  applyFS(_savedFS);
  _ss.style.display = 'none';
}

})();
</script>
